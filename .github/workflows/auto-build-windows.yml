name: Auto Build Windows (from upstream main)
on:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync-and-build:
    name: 'Sync upstream → Build Windows'
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Sync upstream main
        run: |
          git remote add upstream https://github.com/tinyhumansai/openhuman.git
          git fetch upstream main
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x

      - name: Install Rust (1.93.0)
        uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: Windows-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: Windows-cargo-registry-

      - name: Cache CEF binary distribution
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/tauri-cef
          key: cef-windows-${{ hashFiles('app/src-tauri/Cargo.toml') }}
          restore-keys: cef-windows-

      - name: Cache vendored tauri-cli
        id: tauri-cli-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: vendored-tauri-cli-windows-${{ hashFiles('app/src-tauri/vendor/tauri-cef/crates/tauri-cli/Cargo.toml') }}

      - name: Install vendored tauri-cli
        if: steps.tauri-cli-cache.outputs.cache-hit != 'true'
        run: cargo install --locked --path app/src-tauri/vendor/tauri-cef/crates/tauri-cli

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (CEF, vendored CLI)
        working-directory: app
        run: |
          NODE_OPTIONS="--max-old-space-size=8192" cargo tauri build --target x86_64-pc-windows-msvc

      - name: Upload MSI
        uses: actions/upload-artifact@v5
        with:
          name: windows-msi
          path: |
            app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload NSIS
        uses: actions/upload-artifact@v5
        with:
          name: windows-nsis
          path: |
            app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
